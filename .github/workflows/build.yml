---
name: Build container image

on:
  pull_request:
    branches: ['*']

  schedule:
    - cron: '05 10 * * *' # 10:05 UTC daily

  push:
    branches: ['*']
    paths-ignore:
      - '**/README.md'
      - 'releases.json'

  workflow_dispatch:

env:
  IMAGE_DESC: "Zerith"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image

    runs-on: ubuntu-24.04

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        flavor:
          - ""
          - "nvidia"

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Change image name depending on build flavor
        env:
          BUILD_FLAVOR: ${{ matrix.flavor }}
        run: |
          if [ -n "$BUILD_FLAVOR" ]; then
            echo "IMAGE_NAME=${IMAGE_NAME}-${BUILD_FLAVOR}" >> "$GITHUB_ENV"
          fi

      - name: Lowercase image variables
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set tag prefix
        if: github.ref_name != 'main'
        run: |
          echo "TAG_PREFIX=${{ github.ref_name }}." >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Generate deploy id
        id: deploy_id
        run: echo "id=${GITHUB_SHA:0:8}$(openssl rand -hex 4)" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}

          tags: |
            type=raw,value=${{ env.TAG_PREFIX }}{{date 'YYYYMMDD'}}
            type=raw,value=${{ env.TAG_PREFIX }}${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.TAG_PREFIX }}${{ steps.deploy_id.outputs.id }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr

          labels: |
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version={{date 'YYYYMMDD'}}
            org.zerith.deploy-id=${{ steps.deploy_id.outputs.id }}

          sep-tags: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            DEPLOY_ID=${{ steps.deploy_id.outputs.id }}
          oci: false

      - name: Post-process image
        run: |
          set -e
          buildah unshare bash -c '
            set -e
            buildah images
            ctr=$(buildah from containers-storage:${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_PREFIX }}${{ env.DEFAULT_TAG }})
            mnt=$(buildah mount "$ctr")

            # 1. Clean runtime/cache data IN THE IMAGE (note the $mnt prefix on every path)
            rm -rf \
                "$mnt"/var/lib/pacman/sync/* \
                "$mnt"/var/tmp/* \
                "$mnt"/var/lib/dbus/machine-id
            find "$mnt/var/cache" "$mnt/var/log" -type f -delete 2>/dev/null || true

            # 2. Rootfs layout BEFORE capture, so roothome/srv are included in factory /var
            rm -rf "$mnt/root" "$mnt/srv"
            mkdir -p "$mnt/var/roothome" "$mnt/var/srv"
            ln -sfn var/roothome "$mnt/root"
            ln -sfn var/srv      "$mnt/srv"

            # 3. Preserve factory defaults — capture /var and relocate /etc -> /usr/etc
            mkdir -p "$mnt/usr/share/factory"
            cp -a "$mnt/var" "$mnt/usr/share/factory/var"
            mkdir -p "$mnt/usr/etc"
            cp -a "$mnt/etc/." "$mnt/usr/etc/"
            rm -f "$mnt/usr/etc/machine-id"

            # 4. NOW blank the mutable dirs back to empty mountpoints
            for d in etc var home dev proc sys run tmp mnt boot deploy; do
                rm -rf "$mnt/$d"
                mkdir -p "$mnt/$d"
            done
            chmod 1777 "$mnt/tmp"

            buildah unmount "$ctr"
            buildah commit "$ctr" post-processed
            buildah rm "$ctr"
            for tag in ${{ steps.metadata.outputs.tags }}; do
              buildah tag post-processed "$tag"
            done
          '

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
